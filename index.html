<!DOCTYPE html>

<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>

</head>

<body>
    <header>
        <h1>A garota do blog</h1>
        <p>Blog de mentiras gerais</p>
        <style>
            p{
                font-family: );
            }
            h1{
                font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
                font-size: large;
            }
            header {
                background-color: #ac4da4ab;
                color: #FFFFFF;
                text-align: center;
                max-width: 800px;
                margin: 0 auto;
                padding: 16px;
            }

            main {
                background-color: #FFFFFF;
                color: #182963;

            }

            article {
                display: flex;
            }

            img {
                width: 200px;
                height: 200px;
                border: 20px;
            }

            .artigo-autor {
                font-weight: bold;
            }
        </style>
    </header>

    <main>
        <article>
            <img src="https://f.i.uol.com.br/fotografia/2019/07/07/15625393015d227525a5e13_1562539301_3x2_md.jpg"
                alt="Logotipo conceitual de tecnologia e educacao: um livro aberto de onde emerge um cérebro digital brilhante, cercado por ícones de Wi-Fi, circuitos e lâmpada de ideia. Cores em tons de azul e branco.">

            <div>
                <h2>Meu primeiro post</h2>
                <p class="artigo-autor">Por: Marcelo Paludetto</p>
                <p>Boas-vindas ao meu novo blog! Aqui vou compartilhar dicas de programação
                    e curiosidades da área de tecnologia.</p>
                <button>🤪<span>0</span></button>
                <button>🤮<span>0</span></button>
            </div>
        </article>
        <article>
            <img src="https://upload.wikimedia.org/wikipedia/pt/7/75/Mamonas-assassinas.jpg"
                alt="Logotipo conceitual de tecnologia e educacao: um livro aberto de onde emerge um cérebro digital brilhante, cercado por ícones de Wi-Fi, circuitos e lâmpada de ideia. Cores em tons de azul e branco.">

            <div>
                <h2>Meu segundo post</h2>
                <p class="artigo-autor">Por: Marcelo Paludetto</p>
                <p>Aqui vou compartilhar noticias com a fonte suspeita.</p>
                <button>🤪<span>0</span></button>
                <button>🤮<span>0</span></button>
            </div>
        </article>

    </main>
</body>

<script>
    const botoes = document.querySelectorAll("button");

    botoes.forEach(function (botao) {
        botao.addEventListener("click", botaoClicado);
        function botaoClicado() {
            console.log("fui clicado");
            let texto = botao.querySelector("span");
            texto.textContent++;
        }
    });



</script>

</html>
